<!DOCTYPE html>
<html lang="en">

<head>
    <title>Visit Us | Veggie Heart</title>
    <meta charset="UTF-8">
    <meta name="description" content="Shopping Website for Mini-Mart in Trinidad">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="header">
    <h1>
        <a href="index.html">
            <img src="images/favicon.ico" alt="Logo" width="30">
        </a>
        <span>Veggie</span> Heart
    </h1>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="visit.html">Visit</a>
        <a href="favorites.html">Favorites</a>
    </nav>

    <div class="icons">
            <div class="fa fa-search" id="search-icon"></div>
            <div class="icon-cart">
                <i class="fa fa-shopping-cart" id="cart-icon"></i>
                <span id="cart-count">0</span>
            </div>
            <div class="fa fa-user" id="user-icon"></div>
    </div>

    <form class="search-form">
        <input type="search" id="search-box" placeholder="Search products...">
        <label for="search-box" class="fa fa-search"></label>
    </form>

    <form class="login-form">
        <h3>Login</h3>
        <input type="email" placeholder="Email" class="box">
        <input type="password" placeholder="Password" class="box">

        <div class="remember">
            <input type="checkbox" id="remember-me">
            <label for="remember-me">Remember Me</label>
        </div>

        <button type="submit" class="btn">Login</button>
        <p>Don't have an account? <a href="#">Register Now</a></p>
    </form>

</header>

    <div class="cart">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <h3>Total: TT$<span id="cart-total">0</span></h3>
    <button class="btn" onclick="checkout()">Checkout</button>
    </div>

    <div class="contact-section">
        <div class="contact-container">
            <div class="contact-info">
                <h2>CONTACT US</h2>
                <p>(868) 296-5090</p>
            </div>
            <div class="contact-form">
                <form action="#" method="post">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                    
                    <button type="submit" class="navbar-button">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <div class = "map-container">
        <h2>FIND US HERE</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4998.508796207455!2d-61.399498300000005!3d10.641568799999998!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8c3600a30808a9fb%3A0x63fa52505f29ebcd!2sThe%20University%20of%20the%20West%20Indies%20-%20St.%20Augustine%20Campus!5e1!3m2!1sen!2stt!4v1776060913827!5m2!1sen!2stt" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <footer>
        <div class="footer-content">
            <p><i>At Veggie Heart&copy;, we're a chop above the rest. 2026 All rights reserved.</i></p>
            <div class="social-icons">
                <a href="https://www.facebook.com/people/Dennis-Vegetable-Stall/100066563530073/" target="_blank">
                    <img src="images/facebook.png" alt="Facebook">
                </a>
                <a href="https://wa.me/18682965090" target="_blank">
                    <img src="images/whatsapp.png" alt="WhatsApp">
                </a>
                <a href="https://www.instagram.com" target="_blank">
                    <img src="images/instagram.png" alt="Instagram">
                </a>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
